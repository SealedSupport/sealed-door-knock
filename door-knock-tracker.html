<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1f2e">
<title>Sealed Door Knock</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f1117;
    --surface: #1a1f2e;
    --surface2: #242938;
    --border: #2e3447;
    --accent: #4f8ef7;
    --text: #e8eaf0;
    --text-dim: #6b7280;
    --completed: #22c55e;
    --no-access: #f97316;
    --not-interested: #ef4444;
    --callback: #a855f7;
    --listed: #4f8ef7;
    --potential: #eab308;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    z-index: 100;
  }
  .topbar-logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .topbar-sep { color: var(--border); font-size: 18px; }
  .suburb-tabs {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .suburb-tabs::-webkit-scrollbar { display: none; }
  .suburb-tab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .suburb-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .stats-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  /* SECTION ROW */
  .section-row {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .section-row::-webkit-scrollbar { display: none; }
  .section-pill {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .section-pill.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* MAP */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* LEGEND */
  .legend {
    position: absolute;
    bottom: 80px;
    left: 12px;
    z-index: 500;
    background: rgba(26,31,46,0.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    backdrop-filter: blur(8px);
    font-size: 11px;
  }
  .legend-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
    color: var(--text);
    font-weight: 500;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* BOTTOM SHEET */
  .sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.open { display: block; }

  .bottom-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 0 0 40px;
    z-index: 1001;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    border-top: 1px solid var(--border);
  }
  .bottom-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 16px;
  }
  .sheet-address {
    padding: 0 20px 4px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .sheet-suburb {
    padding: 0 20px 16px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .sheet-divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px 16px;
  }
  .sheet-label {
    padding: 0 20px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 20px 16px;
  }
  .status-btn {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .status-btn:active { transform: scale(0.97); }
  .status-btn.selected {
    border-width: 2px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sheet-note-label {
    padding: 0 20px 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .sheet-note {
    margin: 0 20px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    resize: none;
    width: calc(100% - 40px);
    outline: none;
  }
  .sheet-note:focus { border-color: var(--accent); }
  .sheet-save {
    margin: 0 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: calc(100% - 40px);
    transition: opacity 0.15s;
  }
  .sheet-save:active { opacity: 0.8; }
  .sheet-delete {
    display: block;
    margin: 10px auto 0;
    background: none;
    border: none;
    color: var(--not-interested);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 6px;
  }

  /* STATS PANEL */
  .stats-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 2000;
    overflow-y: auto;
    padding: 60px 20px 40px;
  }
  .stats-panel.open { display: block; }
  .stats-close {
    position: fixed;
    top: 16px; right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    padding: 6px 12px;
    cursor: pointer;
    z-index: 2001;
  }
  .stats-title {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .stats-sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 24px;
  }
  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .stats-card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .stats-card-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stats-card-val {
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
    margin-top: 2px;
  }
  .stats-section-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 20px 0 10px;
  }
  .progress-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .progress-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .progress-bar-count { color: var(--text-dim); font-size: 12px; }
  .progress-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s;
  }

  /* SETUP BANNER */
  .setup-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 60px 20px 20px;
    z-index: 3000;
  }
  .setup-banner.show { display: block; }
  .setup-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .setup-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; }
  .setup-field-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .setup-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    margin-bottom: 12px;
  }
  .setup-input:focus { border-color: var(--accent); }
  .setup-save {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .setup-skip {
    width: 100%;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    padding: 6px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Leaflet custom */
  .leaflet-container { background: #1a1f2e; }
  .custom-pin {
    width: 28px; height: 28px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .custom-pin-inner {
    width: 10px; height: 10px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    transform: rotate(45deg);
  }
  .section-label {
    background: rgba(79,142,247,0.15);
    border: 1.5px solid rgba(79,142,247,0.5);
    color: #4f8ef7;
    font-weight: 800;
    font-size: 13px;
    border-radius: 8px;
    padding: 3px 8px;
    white-space: nowrap;
    font-family: -apple-system, sans-serif;
  }
</style>
</head>
<body>

<!-- SETUP BANNER -->
<div class="setup-banner show" id="setupBanner">
  <div class="setup-title">Welcome to Sealed Door Knock 👋</div>
  <div class="setup-sub">Connect to Supabase to share data across your team, or tap Skip to use local storage only.</div>
  <div class="setup-field-label">Supabase URL</div>
  <input class="setup-input" id="sbUrl" placeholder="https://xxxx.supabase.co" />
  <div class="setup-field-label">Supabase Anon Key</div>
  <input class="setup-input" id="sbKey" placeholder="eyJ..." />
  <button class="setup-save" onclick="saveSupabase()">Connect & Save</button>
  <button class="setup-skip" onclick="skipSetup()">Skip — use local only</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">Sealed</div>
  <div class="topbar-sep">|</div>
  <div class="suburb-tabs">
    <button class="suburb-tab active" onclick="switchSuburb('highett', this)">Highett</button>
    <button class="suburb-tab" onclick="switchSuburb('cheltenham', this)">Cheltenham</button>
    <button class="suburb-tab" onclick="switchSuburb('mentone', this)">Mentone</button>
  </div>
  <button class="stats-btn" onclick="openStats()" title="Stats">📊</button>
</div>

<!-- SECTION ROW -->
<div class="section-row" id="sectionRow"></div>

<!-- MAP -->
<div id="map"></div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-title">Status</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--completed)"></div>Completed</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--no-access)"></div>No Access</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--not-interested)"></div>Not Interested</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--callback)"></div>Callback</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--listed)"></div>Listed</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--potential)"></div>Potential Lead</div>
</div>

<!-- SHEET OVERLAY -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-address" id="sheetAddress">Loading...</div>
  <div class="sheet-suburb" id="sheetSuburb"></div>
  <div class="sheet-divider"></div>
  <div class="sheet-label">Mark as</div>
  <div class="status-grid" id="statusGrid"></div>
  <div class="sheet-note-label">Notes (optional)</div>
  <textarea class="sheet-note" id="sheetNote" rows="2" placeholder="e.g. spoke to John, interested in selling next year…"></textarea>
  <button class="sheet-save" onclick="saveEntry()">Save</button>
  <button class="sheet-delete" id="sheetDelete" onclick="deleteEntry()" style="display:none">Remove marker</button>
</div>

<!-- STATS PANEL -->
<div class="stats-panel" id="statsPanel">
  <button class="stats-close" onclick="closeStats()">✕</button>
  <div class="stats-title">Progress</div>
  <div class="stats-sub" id="statsDate"></div>
  <div id="statsContent"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const STATUSES = [
  { key: 'completed',     label: 'Completed',      color: '#22c55e', emoji: '✅' },
  { key: 'no_access',     label: 'No Access',      color: '#f97316', emoji: '🚪' },
  { key: 'not_interested',label: 'Not Interested', color: '#ef4444', emoji: '🚫' },
  { key: 'callback',      label: 'Callback',       color: '#a855f7', emoji: '📞' },
  { key: 'listed',        label: 'Listed',         color: '#4f8ef7', emoji: '🏠' },
  { key: 'potential',     label: 'Potential Lead', color: '#eab308', emoji: '⭐' },
];

const SUBURBS = {
  highett: {
    center: [-37.9452, 145.0487], zoom: 15,
    sections: {
      'Section 1': [[-37.9400,145.0560],[-37.9400,145.0620],[-37.9480,145.0620],[-37.9480,145.0560]],
      'Section 2': [[-37.9400,145.0480],[-37.9400,145.0560],[-37.9480,145.0560],[-37.9480,145.0480]],
      'Section 3': [[-37.9400,145.0400],[-37.9400,145.0480],[-37.9480,145.0480],[-37.9480,145.0400]],
    }
  },
  cheltenham: {
    center: [-37.9600, 145.0580], zoom: 15,
    sections: {
      'North':  [[-37.9530,145.0490],[-37.9530,145.0650],[-37.9600,145.0650],[-37.9600,145.0490]],
      'Central':[[-37.9600,145.0490],[-37.9600,145.0650],[-37.9660,145.0650],[-37.9660,145.0490]],
      'South':  [[-37.9660,145.0490],[-37.9660,145.0650],[-37.9730,145.0650],[-37.9730,145.0490]],
    }
  },
  mentone: {
    center: [-37.9800, 145.0630], zoom: 15,
    sections: {
      'North':  [[-37.9740,145.0540],[-37.9740,145.0700],[-37.9810,145.0700],[-37.9810,145.0540]],
      'South':  [[-37.9810,145.0540],[-37.9810,145.0700],[-37.9880,145.0700],[-37.9880,145.0540]],
    }
  }
};

// ============================================================
// STATE
// ============================================================
let map, activeSuburb = 'highett', activeSection = null;
let markers = {}; // key: "lat,lng" => { marker, data }
let pendingLatLng = null, pendingKey = null;
let selectedStatus = null;
let supabaseUrl = '', supabaseKey = '';
let allEntries = {}; // key => entry obj
let sectionLayers = {};

// ============================================================
// SUPABASE SETUP
// ============================================================
function saveSupabase() {
  supabaseUrl = document.getElementById('sbUrl').value.trim().replace(/\/$/, '');
  supabaseKey = document.getElementById('sbKey').value.trim();
  if (!supabaseUrl || !supabaseKey) { showToast('Please fill both fields'); return; }
  localStorage.setItem('dk_sb_url', supabaseUrl);
  localStorage.setItem('dk_sb_key', supabaseKey);
  document.getElementById('setupBanner').classList.remove('show');
  initSupabaseTable().then(() => loadEntries());
  showToast('Connected to Supabase ✓');
}

function skipSetup() {
  document.getElementById('setupBanner').classList.remove('show');
  loadLocalEntries();
}

async function initSupabaseTable() {
  // Table must exist: door_knocks (id uuid, lat float, lng float, address text, suburb text, section text, status text, notes text, created_at timestamptz)
  // We just try a select to verify
  try {
    const r = await sbFetch('GET', '/rest/v1/door_knocks?limit=1');
    if (!r.ok) showToast('Supabase table not found — check setup');
  } catch(e) {}
}

async function sbFetch(method, path, body) {
  if (!supabaseUrl || !supabaseKey) return null;
  const opts = {
    method,
    headers: {
      'apikey': supabaseKey,
      'Authorization': 'Bearer ' + supabaseKey,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(supabaseUrl + path, opts);
}

// ============================================================
// MAP INIT
// ============================================================
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 20
  }).addTo(map);

  const sub = SUBURBS[activeSuburb];
  map.setView(sub.center, sub.zoom);

  map.on('click', onMapClick);
  renderSections();
  renderSectionPills();
}

function renderSections() {
  // Clear old
  Object.values(sectionLayers).forEach(l => map.removeLayer(l));
  sectionLayers = {};

  const sub = SUBURBS[activeSuburb];
  Object.entries(sub.sections).forEach(([name, coords]) => {
    const poly = L.polygon(coords, {
      color: activeSection === name ? '#4f8ef7' : '#4f8ef7',
      fillColor: activeSection === name ? '#4f8ef7' : 'transparent',
      fillOpacity: activeSection === name ? 0.08 : 0,
      weight: activeSection === name ? 2 : 1,
      opacity: activeSection === name ? 0.9 : 0.4,
      dashArray: activeSection === name ? null : '4,4'
    }).addTo(map);

    const center = poly.getBounds().getCenter();
    const lbl = L.divIcon({
      className: '',
      html: `<div class="section-label">${name}</div>`,
      iconAnchor: [0, 0]
    });
    const lblMarker = L.marker(center, { icon: lbl, interactive: false }).addTo(map);
    sectionLayers[name] = L.layerGroup([poly, lblMarker]).addTo(map);

    poly.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      onMapClick(e);
    });
  });
}

function renderSectionPills() {
  const row = document.getElementById('sectionRow');
  const sub = SUBURBS[activeSuburb];
  row.innerHTML = '<button class="section-pill' + (activeSection === null ? ' active' : '') + '" onclick="setSection(null, this)">All</button>';
  Object.keys(sub.sections).forEach(name => {
    const active = activeSection === name ? ' active' : '';
    row.innerHTML += `<button class="section-pill${active}" onclick="setSection('${name}', this)">${name}</button>`;
  });
}

function setSection(name, btn) {
  activeSection = name;
  document.querySelectorAll('.section-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSections();
  if (name) {
    const coords = SUBURBS[activeSuburb].sections[name];
    const poly = L.polygon(coords);
    map.fitBounds(poly.getBounds(), { padding: [30, 30] });
  } else {
    const sub = SUBURBS[activeSuburb];
    map.setView(sub.center, sub.zoom);
  }
}

function switchSuburb(name, btn) {
  activeSuburb = name;
  activeSection = null;
  document.querySelectorAll('.suburb-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sub = SUBURBS[name];
  map.setView(sub.center, sub.zoom);
  renderSections();
  renderSectionPills();
  renderAllMarkers();
}

// ============================================================
// MAP CLICK → REVERSE GEOCODE → SHEET
// ============================================================
async function onMapClick(e) {
  const { lat, lng } = e.latlng;
  pendingLatLng = { lat, lng };
  pendingKey = `${lat.toFixed(6)},${lng.toFixed(6)}`;

  // Check if existing
  const existing = allEntries[pendingKey];

  document.getElementById('sheetAddress').textContent = '📍 Loading address...';
  document.getElementById('sheetSuburb').textContent = '';
  openSheet();

  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
    const d = await r.json();
    const road = d.address?.road || d.address?.pedestrian || 'Unknown Road';
    const num = d.address?.house_number || '';
    const suburb = d.address?.suburb || d.address?.city_district || activeSuburb;
    document.getElementById('sheetAddress').textContent = num ? `${num} ${road}` : road;
    document.getElementById('sheetSuburb').textContent = suburb + ', VIC';
    pendingKey._address = num ? `${num} ${road}` : road;
    pendingKey._suburb = suburb;
    // store for saving
    window._pendingAddress = num ? `${num} ${road}` : road;
    window._pendingSuburb = suburb;
  } catch(e) {
    document.getElementById('sheetAddress').textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    window._pendingAddress = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    window._pendingSuburb = activeSuburb;
  }

  // Pre-fill if existing
  if (existing) {
    selectedStatus = existing.status;
    document.getElementById('sheetNote').value = existing.notes || '';
    document.getElementById('sheetDelete').style.display = 'block';
  } else {
    selectedStatus = null;
    document.getElementById('sheetNote').value = '';
    document.getElementById('sheetDelete').style.display = 'none';
  }
  renderStatusGrid();
}

function renderStatusGrid() {
  const grid = document.getElementById('statusGrid');
  grid.innerHTML = STATUSES.map(s => `
    <button class="status-btn${selectedStatus === s.key ? ' selected' : ''}"
      style="${selectedStatus === s.key ? `border-color:${s.color};background:${s.color}22` : ''}"
      onclick="selectStatus('${s.key}')">
      <div class="status-dot" style="background:${s.color}"></div>
      ${s.emoji} ${s.label}
    </button>
  `).join('');
}

function selectStatus(key) {
  selectedStatus = key;
  renderStatusGrid();
}

// ============================================================
// SHEET
// ============================================================
function openSheet() {
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('bottomSheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('bottomSheet').classList.remove('open');
  pendingLatLng = null;
  pendingKey = null;
  selectedStatus = null;
}

// ============================================================
// SAVE / DELETE
// ============================================================
async function saveEntry() {
  if (!selectedStatus) { showToast('Please select a status'); return; }
  const key = `${pendingLatLng.lat.toFixed(6)},${pendingLatLng.lng.toFixed(6)}`;
  const entry = {
    key,
    lat: pendingLatLng.lat,
    lng: pendingLatLng.lng,
    address: window._pendingAddress || key,
    suburb: window._pendingSuburb || activeSuburb,
    section: activeSection || '',
    status: selectedStatus,
    notes: document.getElementById('sheetNote').value,
    updated_at: new Date().toISOString()
  };

  allEntries[key] = entry;
  saveLocalEntries();
  if (supabaseUrl) await upsertSupabase(entry);
  placeMarker(entry);
  closeSheet();
  const s = STATUSES.find(x => x.key === selectedStatus);
  showToast(`${s.emoji} Marked as ${s.label}`);
}

async function deleteEntry() {
  const key = `${pendingLatLng.lat.toFixed(6)},${pendingLatLng.lng.toFixed(6)}`;
  if (markers[key]) {
    map.removeLayer(markers[key].marker);
    delete markers[key];
  }
  delete allEntries[key];
  saveLocalEntries();
  if (supabaseUrl) await sbFetch('DELETE', `/rest/v1/door_knocks?key=eq.${encodeURIComponent(key)}`);
  closeSheet();
  showToast('Marker removed');
}

async function upsertSupabase(entry) {
  try {
    await sbFetch('POST', '/rest/v1/door_knocks', { ...entry, id: entry.key });
  } catch(e) {}
}

// ============================================================
// MARKERS
// ============================================================
function placeMarker(entry) {
  const key = entry.key;
  if (markers[key]) map.removeLayer(markers[key].marker);
  const s = STATUSES.find(x => x.key === entry.status) || STATUSES[0];
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      background:${s.color};
      border:2px solid rgba(255,255,255,0.4);
      box-shadow:0 2px 8px rgba(0,0,0,0.4);
    "><div style="
      width:10px;height:10px;
      background:rgba(255,255,255,0.7);
      border-radius:50%;
      margin:7px auto;
      transform:rotate(45deg);
    "></div></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28]
  });
  const marker = L.marker([entry.lat, entry.lng], { icon })
    .addTo(map)
    .on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      pendingLatLng = { lat: entry.lat, lng: entry.lng };
      pendingKey = key;
      window._pendingAddress = entry.address;
      window._pendingSuburb = entry.suburb;
      document.getElementById('sheetAddress').textContent = entry.address;
      document.getElementById('sheetSuburb').textContent = entry.suburb + ', VIC';
      selectedStatus = entry.status;
      document.getElementById('sheetNote').value = entry.notes || '';
      document.getElementById('sheetDelete').style.display = 'block';
      renderStatusGrid();
      openSheet();
    });
  markers[key] = { marker, data: entry };
}

function renderAllMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m.marker));
  markers = {};
  Object.values(allEntries).forEach(e => placeMarker(e));
}

// ============================================================
// LOCAL STORAGE
// ============================================================
function saveLocalEntries() {
  localStorage.setItem('dk_entries', JSON.stringify(allEntries));
}

function loadLocalEntries() {
  try {
    const raw = localStorage.getItem('dk_entries');
    if (raw) { allEntries = JSON.parse(raw); renderAllMarkers(); }
  } catch(e) {}
}

// ============================================================
// SUPABASE LOAD
// ============================================================
async function loadEntries() {
  try {
    const r = await sbFetch('GET', '/rest/v1/door_knocks?select=*&order=updated_at.desc');
    if (r && r.ok) {
      const data = await r.json();
      data.forEach(e => { allEntries[e.key] = e; });
      renderAllMarkers();
    }
  } catch(e) { loadLocalEntries(); }
}

// ============================================================
// STATS
// ============================================================
function openStats() {
  const panel = document.getElementById('statsPanel');
  panel.classList.add('open');
  const entries = Object.values(allEntries);
  document.getElementById('statsDate').textContent = `As of ${new Date().toLocaleDateString('en-AU', {weekday:'long',day:'numeric',month:'long'})}`;

  const total = entries.length;
  const byStatus = {};
  STATUSES.forEach(s => byStatus[s.key] = 0);
  entries.forEach(e => { if (byStatus[e.status] !== undefined) byStatus[e.status]++; });

  const bySuburb = {};
  ['highett','cheltenham','mentone'].forEach(s => bySuburb[s] = entries.filter(e => e.suburb?.toLowerCase().includes(s)).length);

  let html = `
    <div class="stats-card">
      <div class="stats-card-icon" style="background:#4f8ef722">🚪</div>
      <div><div class="stats-card-label">Total Doors Knocked</div><div class="stats-card-val">${total}</div></div>
    </div>
    <div class="stats-card">
      <div class="stats-card-icon" style="background:#22c55e22">✅</div>
      <div><div class="stats-card-label">Completed</div><div class="stats-card-val">${byStatus.completed}</div></div>
    </div>
    <div class="stats-card">
      <div class="stats-card-icon" style="background:#eab30822">⭐</div>
      <div><div class="stats-card-label">Potential Leads</div><div class="stats-card-val">${byStatus.potential + byStatus.callback}</div></div>
    </div>
    <div class="stats-card">
      <div class="stats-card-icon" style="background:#4f8ef722">🏠</div>
      <div><div class="stats-card-label">Listed</div><div class="stats-card-val">${byStatus.listed}</div></div>
    </div>
    <div class="stats-section-header">Breakdown by Status</div>
  `;

  STATUSES.forEach(s => {
    const count = byStatus[s.key] || 0;
    const pct = total > 0 ? Math.round((count/total)*100) : 0;
    html += `
      <div class="progress-bar-wrap">
        <div class="progress-bar-label">
          <span>${s.emoji} ${s.label}</span>
          <span class="progress-bar-count">${count} <span style="color:var(--text-dim)">(${pct}%)</span></span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
      </div>
    `;
  });

  html += `<div class="stats-section-header">By Suburb</div>`;
  ['highett','cheltenham','mentone'].forEach(s => {
    const count = bySuburb[s];
    const pct = total > 0 ? Math.round((count/total)*100) : 0;
    html += `
      <div class="progress-bar-wrap">
        <div class="progress-bar-label">
          <span style="text-transform:capitalize">${s}</span>
          <span class="progress-bar-count">${count}</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
      </div>
    `;
  });

  document.getElementById('statsContent').innerHTML = html;
}

function closeStats() {
  document.getElementById('statsPanel').classList.remove('open');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('load', () => {
  supabaseUrl = localStorage.getItem('dk_sb_url') || '';
  supabaseKey = localStorage.getItem('dk_sb_key') || '';
  if (supabaseUrl && supabaseKey) {
    document.getElementById('setupBanner').classList.remove('show');
    document.getElementById('sbUrl').value = supabaseUrl;
    document.getElementById('sbKey').value = supabaseKey;
    loadEntries();
  }
  initMap();
});
</script>
</body>
</html>
